name: Cloud PC Naprawa Logowania
on: workflow_dispatch

jobs:
  run-pc:
    runs-on: windows-latest
    steps:
      - name: 1. Polaczenie Tailscale
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "ts.exe"
          Start-Process -FilePath ".\ts.exe" -ArgumentList "/quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --unattended

      - name: 2. Instalacja i Konfiguracja Zabezpieczen Sunshine
        shell: powershell
        run: |
          winget install LizardByte.Sunshine --accept-source-agreements --accept-package-agreements
          $conf = "C:\Program Files\Sunshine\config"
          New-Item -ItemType Directory -Force -Path $conf
          
          # Dodajemy zaufane domeny, zeby pozbyc sie bledu CSRF Protection Error
          $sunshineConf = @"
          origin_pin_allowed = true
          require_pin = true
          csrf_allowed_origins = localhost,127.0.0.1,100.103.133.123,runnervmih882-11.tail60f865.ts.net
          "@
          Set-Content -Path "$conf\sunshine.conf" -Value $sunshineConf
          
          # Tworzymy na sztywno konto administratora: login: admin, haslo: RobloxStudio2026!
          # To omija ekran powitalny, ktory sie wysypywal
          & "C:\Program Files\Sunshine\sunshine.exe" --credentials admin RobloxStudio2026!

      - name: 3. Start Serwera
        shell: powershell
        run: |
          Start-Process -FilePath "C:\Program Files\Sunshine\sunshine.exe"
          Start-Sleep -Seconds 20000
          
